<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>入职两个月工作汇报·可编辑</title><style>:root{--paper:#F1F1EA;--panel:#FBFBF7;--ink:#15202B;--muted:#57626B;--line:#B9BBA9;--teal:#1B6B5E;--teal-deep:#123F38;--teal-soft:#DDEBE6;--amber:#B8842A;--amber-soft:#F1E3C4;--steel-soft:#DEE7EE;--brick:#9C4B3B;--brick-soft:#F0DCD5;--font-display:Georgia,"Noto Serif SC",serif;--font-body:"IBM Plex Sans","Noto Sans SC",Arial,sans-serif;--font-mono:"IBM Plex Mono",monospace}*{box-sizing:border-box}body{margin:0;background:#dcdcd1;color:var(--ink);font-family:var(--font-body)}.deck{padding:80px 0 72px}.slide{width:min(1280px,92vw);aspect-ratio:16/9;margin:30px auto;background:var(--panel);border:1px solid var(--line);box-shadow:0 24px 60px rgba(16,27,41,.16);overflow:hidden;position:relative;padding:34px 56px 30px;display:flex;flex-direction:column}.hdr{display:flex;align-items:center;justify-content:space-between;font-family:var(--font-mono);font-size:12px;color:var(--muted);letter-spacing:.05em}.mark{display:flex;gap:9px;color:var(--teal-deep);font-weight:600}.badge{width:20px;height:20px;border:2px solid var(--teal);border-radius:5px;display:inline-flex;align-items:center;justify-content:center}.badge:after{content:"";width:7px;height:7px;border-radius:50%;background:var(--amber)}.progress{height:2px;background:#D5D6C9;margin:12px 0 0}.progress span{display:block;height:2px;background:var(--teal)}.body-area{flex:1;display:flex;flex-direction:column;justify-content:center}.eyebrow{font-family:var(--font-mono);font-size:13px;letter-spacing:.08em;color:var(--teal-deep);font-weight:700}.eyebrow b{color:var(--amber)}.headline{font-family:var(--font-display);font-size:38px;line-height:1.22;margin:10px 0 0}.headline.big{font-size:52px}.lede{font-size:16.5px;line-height:1.7;color:var(--muted);margin-top:10px;max-width:820px}.cols{display:grid;grid-template-columns:1fr 1fr;gap:38px;align-items:center}.wide{grid-template-columns:1.15fr .85fr}.narrow{grid-template-columns:.86fr 1.14fr}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:15px}.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}.panel,.cell,.step,.kpi{border:1px solid var(--line);background:var(--paper);border-radius:4px;padding:16px 18px}.panel h4,.cell h4{font-family:var(--font-display);font-size:18px;margin:0 0 8px}.panel p,.cell p,.step p{font-size:13.6px;line-height:1.58;color:#3a424b;margin:0}.deep{background:var(--teal-deep);color:#eef4f2}.deep p{color:#cfe3de}.taglist{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}.tag{font-family:var(--font-mono);font-size:12px;padding:5px 10px;border:1px solid var(--line);border-radius:3px;color:var(--teal-deep);background:var(--teal-soft)}.tag.amber{background:var(--amber-soft);color:#7a5a17}.tag.steel{background:var(--steel-soft);color:#284d68}.flow{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:20px}.step{text-align:center;position:relative}.step:not(:last-child):after{content:"";position:absolute;right:-13px;top:50%;width:10px;height:10px;border-top:2px solid var(--amber);border-right:2px solid var(--amber);transform:translateY(-50%) rotate(45deg)}.step b{font-family:var(--font-display);color:var(--teal-deep)}.matrix{display:grid;grid-template-columns:1fr 1fr;gap:14px}.warn{border-color:var(--brick);background:var(--brick-soft)}.warn h4{color:#6e2f22}.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:18px}.kpi .n{font-family:var(--font-display);font-size:30px;font-weight:700;color:var(--teal-deep)}.kpi .l{font-family:var(--font-mono);font-size:11.5px;color:var(--muted)}.timeline{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;margin-top:24px;border-top:2px solid var(--line);padding-top:22px}.tnode{text-align:center}.tnode:before{content:"";display:block;margin:0 auto 8px;width:14px;height:14px;border-radius:50%;background:var(--teal)}.tnode strong{font-family:var(--font-mono);font-size:12px;color:var(--teal-deep)}.tnode span{display:block;font-size:12px;color:var(--muted);line-height:1.45;margin-top:6px}.footer-note{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:auto}.dark{background:#101B29;color:#EEF4F2}.dark .headline{color:#EEF4F2}.dark .lede{color:#cfe3de}.dark .footer-note{color:#7f958d}@media(max-width:900px){.cols,.wide,.narrow,.grid3,.grid4,.flow,.matrix,.timeline{grid-template-columns:1fr}.headline.big{font-size:42px}}</style><link rel="stylesheet" href="src/template-editor.css"></head><body><div id="editorChrome" class="editor-chrome"><div class="editor-bar"><div class="editor-brand"><strong>ppt-like-html</strong><span>入职两个月工作汇报 · 可编辑副本</span></div><div class="editor-actions"><button id="btnUndo">撤销</button><button id="btnRedo">恢复</button><button id="btnDelete">删除</button><button id="btnBringFront">置顶</button><button id="btnSendBack">置底</button><button id="btnImage">替换/插入图片</button><button id="btnSave" class="primary">保存</button><button id="btnSaveAs">另存为</button><button id="btnExport">导出静态 HTML</button></div></div><aside id="inspector" class="editor-inspector"><h3>属性</h3><p id="selectionInfo">未选中元素</p><div class="field-grid"><label>X<input id="propX" type="number"></label><label>Y<input id="propY" type="number"></label><label>宽<input id="propW" type="number"></label><label>高<input id="propH" type="number"></label></div><label>文字角色<select id="propRole"><option value="keep">保持当前</option><option value="title">标题</option><option value="body">正文</option><option value="caption">图注</option><option value="tag">标签</option><option value="header">页眉</option></select></label><div class="field-grid"><label>字号<input id="propFontSize" type="number"></label><label>颜色<input id="propColor" type="color"></label></div><label>文字内容<textarea id="propText" rows="5"></textarea></label><label>图片显示<select id="propFit"><option value="contain">完整显示 contain</option><option value="cover">裁剪填满 cover</option></select></label><p class="hint">单击选择；双击文字编辑；拖动移动；Shift/Cmd/Ctrl 多选；Ctrl/Cmd+Z 撤销；Delete 删除。</p></aside></div><div id="templateMount" class="template-mount"><main class="deck" id="deck"></main></div><input id="imageInput" type="file" accept="image/*" hidden><div id="selectionBox" class="editor-selection hidden"><span class="resize-handle"></span></div><div id="toast" class="editor-toast hidden"></div><script>const slides=[['cover','入职两个月阶段工作汇报','汇报周期：2026 年 5 月 6 日 — 2026 年 7 月初。围绕 VIVOID / 三体生物三维细胞模型相关产品，整理产品学习、文献证据、产品资料、客户支持、售后系统、售前线索与 AI 协作沉淀。'],['flow','工作主线总览','两个月的工作从产品认知开始，逐步延伸到文献证据、产品表达、客户问题、售后系统、售前线索；AI / Codex / GitHub / R2 作为贯穿式工作方法，提高结构化与复用效率。','产品学习|证据核验|资料建设|客户支持|系统沉淀'],['timeline','2026.05.06 — 2026.07 初主要工作节奏','05.06-05.08|产品技术学习\n3D 细胞球 / 类器官;05 下旬|客户文献核验\n产品证据分级;06 上旬|内部协助事项\n材料消化;06 中旬|售后系统基础\n微信导入 / 数据库;06 下旬|产品线 PPT\n说明图 / 竞品对标;06.30-07.02|售前拓客\n苏大 raw → memory;07.03-07.04|售后案例 / 性能\n汇报整理'],['cards','产品技术学习','建立“产品结构 → 实验场景 → 客户价值”的理解框架','方法维度|超低吸附板、悬滴法、琼脂糖包被、微孔阵列、微流控、磁悬浮、3D 打印。;场景维度|药物筛选、NK/PBMC 杀伤、ADCC、ADCP、CDC、CAR-M、纳米颗粒渗透。;表达维度|从“知道是什么”推进到“能解释为什么客户需要、如何选型和如何使用”。'],['evidence','文献证据核验','不能把“方向相关论文”直接写成“使用公司产品”','围绕 VIVOID、三体生物、AUT042801、Honeycomb Chips、micro-well、ULA 等关键词，对客户发表文章进行证据分级，明确宣传边界。'],['cards4','产品线资料与展示材料','产品叙事从“成球耗材”升级为“三维细胞模型培养解决方案”','产品结构|超低吸附板、A 款蜂窝片、B 款蜂窝片、C 款、96 孔细胞球蜂巢培养板。;图文资料|产品图、使用说明图、移液枪操作图、EP 管承接图、超净工作台场景图。;竞品对标|Corning Spheroid Microplates、ULA Plates、Elplasia Microcavity Plates。;叙事升级|面向细胞球、类器官前处理、药筛、毒理、免疫杀伤等完整场景。'],['matrix','客户售后问题支持','典型案例：96 孔蜂巢板细胞球培养 40 h 后不易取出','生物因素|细胞类型、成团紧密度、ECM 分泌、培养时间和球体大小。;材料因素|表面处理、微孔结构、球体与孔壁接触面积。;操作因素|枪头位置、角度、预润湿、吹打强度、液面高度。;沉淀方向|异常判断流程、标准回复、图示 SOP、客户注意事项。'],['flowv','售后信息管理系统','从“微信群记录导入”升级为“客户问题知识库”','输入层|微信群、图片、视频、客户描述;处理层|原子记录、多标签聚合、证据篮、身份字段;知识层|客户问题知识库、售后证据库、标准回复;边界层|客户沟通与内部讨论分离，隐私优先'],['flow','售前高校拓客资料库','以苏州大学基础医学院为起点，建立 raw → memory → R2 → 工作台链路','Raw Crawler|Memory Repo|R2|Overlay|工作台'],['matrix','AI 协作贯穿始终','AI 不是单独工作模块，而是贯穿信息收集、结构化、系统化和复核的底层方法','Codex|系统结构、字段契约、仓库修改、页面框架。;GitHub|产品线资料、售后记忆、售前线索、raw data。;R2 / JSON|结构化资料发布，前端只读读取。;人工复核|文献证据、客户问题、销售线索、产品宣传。'],['cards4','其他协助事项','附带支持与正在接手工作，不作为主线夸大','售后群答疑|参与微信售后问题群中部分客户问题跟进与答疑。;交流会议支持|外部讲解或客户交流会议中协助回答产品和实验问题。;公众号 / 小红书|初步接手官方账号，熟悉历史素材、内容定位和后续方向，尚未正式发布。;候选人材料|少量协助简历概述、论文信息、作者身份和影响因子核验。'],['cards4','阶段性成果','两个月形成的主要沉淀','技术框架|建立三维细胞模型与产品应用理解。;证据分级|明确客户文献可宣传边界。;产品表达|PPT、说明图、竞品对标和产品叙事升级。;售后知识|客户问题逐步转为 FAQ / SOP。;售后系统|从群聊导入走向问题知识库。;售前线索|高校 raw → memory → R2 → 工作台链路启动。;AI 协作|Codex / GitHub / R2 工作流初步成型。;内容渠道|公众号、小红书开始接手熟悉。'],['warn','当前问题与不足','下一阶段需要继续规范化与系统化','证据仍需复核|文献、客户案例、产品宣传材料需继续标注证据等级和可引用范围。;系统仍在迭代|售后/售前系统的性能、权限、字段、搜索体验仍需持续优化。;视觉资料需统一|产品图必须在风格统一的同时保证结构和形态准确。;AI 不能替代判断|涉及客户、文献、销售线索和宣传口径时必须保留人工复核。;内容渠道未成体系|公众号与小红书尚处熟悉阶段，还未形成稳定选题和发布流程。;工作边界需清晰|临时协助事项可以记录，但不应冲淡产品、客户和系统主线。'],['flow','下一阶段计划','延续沉淀式推进方式，把资料、问题和线索进一步产品化','产品资料库|文献证据库|售后知识库|售前线索库|内容渠道'],['end','汇报总结','围绕三维细胞模型产品，将产品知识、文献证据、客户问题和销售线索持续沉淀为公司可复用资产。']];function H(n,p){return `<div class="hdr"><div class="mark"><span class="badge"></span>入职工作汇报</div><div>NO. ${String(n).padStart(2,'0')} / 15</div></div><div class="progress"><span style="width:${p}%"></span></div>`}function cards(s,cls='grid4'){return `<div class="${cls}" style="margin-top:20px">${s.split(';').map(x=>{let[t,b]=x.split('|');return `<div class="panel"><h4>${t}</h4><p>${b||''}</p></div>`}).join('')}</div>`}function slide(d,i){let[k,t,b,c]=d,p=[0,13,20,27,33,40,47,53,60,67,73,80,87,93,100][i-1],body='';if(k==='cover')body=`<div class="cols narrow"><div><div class="eyebrow"><b>§00</b> ONBOARDING REVIEW</div><h1 class="headline big">${t}</h1><p class="lede">${b}</p><div class="kpi-row"><div class="kpi"><div class="n">7</div><div class="l">核心工作主线</div></div><div class="kpi"><div class="n">2</div><div class="l">在建业务系统</div></div><div class="kpi"><div class="n">3</div><div class="l">知识资产方向</div></div></div></div><div class="panel deep"><h4>主线</h4><p>产品知识 / 文献证据 / 产品资料 / 售后支持 / 售后系统 / 售前线索 / AI 协作贯穿</p></div></div>`;else if(k==='timeline')body=`<div class="eyebrow"><b>§02</b> 时间线</div><h2 class="headline">${t}</h2><div class="timeline">${b.split(';').map(x=>{let[a,z]=x.split('|');return `<div class="tnode"><strong>${a}</strong><span>${z.replace(/\n/g,'<br>')}</span></div>`}).join('')}</div>`;else if(k==='flow')body=`<div class="eyebrow"><b>§${String(i-1).padStart(2,'0')}</b> ${t}</div><h2 class="headline">${b}</h2><div class="flow">${c.split('|').map(x=>`<div class="step"><b>${x}</b><p>持续沉淀与复核</p></div>`).join('')}</div>`;else if(k==='flowv')body=`<div class="cols narrow"><div><div class="eyebrow"><b>§${String(i-1).padStart(2,'0')}</b> ${t}</div><h2 class="headline">${b}</h2></div><div class="flow" style="grid-template-columns:1fr;gap:10px">${c.split(';').map(x=>{let[a,z]=x.split('|');return `<div class="step"><b>${a}</b><p>${z}</p></div>`}).join('')}</div></div>`;else if(k==='matrix')body=`<div class="cols wide"><div><div class="eyebrow"><b>§${String(i-1).padStart(2,'0')}</b> ${t}</div><h2 class="headline">${b}</h2></div><div class="matrix">${c.split(';').map(x=>{let[a,z]=x.split('|');return `<div class="cell"><h4>${a}</h4><p>${z}</p></div>`}).join('')}</div></div>`;else if(k==='cards'||k==='cards4'||k==='warn')body=`<div class="eyebrow"><b>§${String(i-1).padStart(2,'0')}</b> ${t}</div><h2 class="headline">${b}</h2>`+cards(c,k==='cards'?'grid3':'grid4');else if(k==='evidence')body=`<div class="cols narrow"><div><div class="eyebrow"><b>§04</b> ${t}</div><h2 class="headline">${b}</h2><p class="lede">${c}</p></div><div class="panel deep"><h4>证据分级</h4><p>强证据：Methods/Materials 明确产品名、公司名或货号。中证据：Acknowledgement 或高度特异结构。弱线索：仅研究方向相关，暂不宣传。</p></div></div>`;else if(k==='end')return `<section class="slide dark" id="s${i}">${H(i,100)}<div class="body-area" style="align-items:center;text-align:center"><div class="eyebrow" style="color:#B8842A"><b>§14</b> SUMMARY</div><h2 class="headline" style="font-size:32px;max-width:920px">${b}</h2><div class="taglist" style="justify-content:center"><span class="tag amber">产品知识</span><span class="tag amber">文献证据</span><span class="tag amber">售后知识库</span><span class="tag amber">售前线索库</span></div></div><div class="footer-note"><span>汇报完毕，谢谢</span><span>2026.05.06 — 2026.07 初</span></div></section>`;return `<section class="slide" id="s${i}">${H(i,p)}<div class="body-area">${body}</div><div class="footer-note"><span>入职两个月阶段工作汇报</span><span>可编辑 HTML</span></div></section>`}document.getElementById('deck').innerHTML=slides.map((d,i)=>slide(d,i+1)).join('');</script><script src="src/template-editor.js"></script></body></html>
