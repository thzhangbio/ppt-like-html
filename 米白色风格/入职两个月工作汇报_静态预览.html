<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>入职两个月工作汇报·静态预览</title><style>:root{--paper:#F1F1EA;--panel:#FBFBF7;--ink:#15202B;--muted:#57626B;--line:#B9BBA9;--teal:#1B6B5E;--teal-deep:#123F38;--teal-soft:#DDEBE6;--amber:#B8842A;--amber-soft:#F1E3C4;--brick:#9C4B3B;--brick-soft:#F0DCD5;--font-display:Georgia,"Noto Serif SC",serif;--font-body:"IBM Plex Sans","Noto Sans SC",Arial,sans-serif;--font-mono:"IBM Plex Mono",monospace}*{box-sizing:border-box}body{margin:0;background:#dcdcd1;color:var(--ink);font-family:var(--font-body)}.toolbar{position:sticky;top:0;z-index:20;background:rgba(241,241,234,.92);border-bottom:1px solid var(--line);padding:10px 34px;display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:12.5px;color:var(--muted)}.toolbar b{color:var(--teal-deep)}.deck{padding:26px 0 72px}.slide{width:min(1280px,92vw);aspect-ratio:16/9;margin:30px auto;background:var(--panel);border:1px solid var(--line);box-shadow:0 24px 60px rgba(16,27,41,.16);overflow:hidden;position:relative;padding:34px 56px 30px;display:flex;flex-direction:column}.hdr{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:12px;color:var(--muted)}.mark{color:var(--teal-deep);font-weight:600}.progress{height:2px;background:#D5D6C9;margin:12px 0 0}.progress span{display:block;height:2px;background:var(--teal)}.body-area{flex:1;display:flex;flex-direction:column;justify-content:center}.eyebrow{font-family:var(--font-mono);font-size:13px;color:var(--teal-deep);font-weight:700;letter-spacing:.08em}.eyebrow b{color:var(--amber)}.headline{font-family:var(--font-display);font-size:38px;line-height:1.22;margin:10px 0 0}.headline.big{font-size:52px}.lede{font-size:16.5px;line-height:1.7;color:var(--muted);margin-top:10px;max-width:820px}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:20px}.panel{border:1px solid var(--line);background:var(--paper);border-radius:4px;padding:16px 18px}.panel h4{font-family:var(--font-display);font-size:18px;margin:0 0 8px}.panel p{font-size:13.6px;line-height:1.58;color:#3a424b;margin:0}.flow{display:grid;grid-template-columns:repeat(5,1fr);gap:16px;margin-top:22px}.step{border:1px solid var(--line);background:var(--paper);border-radius:4px;padding:16px;text-align:center}.step b{font-family:var(--font-display);color:var(--teal-deep)}.step p{font-size:13px;color:var(--muted);line-height:1.45}.taglist{display:flex;flex-wrap:wrap;gap:8px;margin-top:16px}.tag{font-family:var(--font-mono);font-size:12px;padding:5px 10px;border:1px solid var(--line);border-radius:3px;color:var(--teal-deep);background:var(--teal-soft)}.tag.amber{background:var(--amber-soft);color:#7a5a17}.footer-note{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--muted);margin-top:auto}.dark{background:#101B29;color:#EEF4F2}.dark .headline{color:#EEF4F2}.dark .footer-note{color:#7f958d}@media(max-width:900px){.grid,.flow{grid-template-columns:1fr}.headline.big{font-size:42px}}</style></head><body><div class="toolbar"><span><b>入职两个月阶段工作汇报</b> · VIVOID / 三体生物</span><span>2026.05.06 — 2026.07 初 · 共 15 页</span></div><main class="deck" id="deck"></main><script>const data=[['入职两个月阶段工作汇报','汇报周期：2026 年 5 月 6 日 — 2026 年 7 月初。围绕 VIVOID / 三体生物三维细胞模型相关产品，整理产品学习、文献证据、产品资料、客户支持、售后系统、售前线索与 AI 协作沉淀。','产品知识|文献证据|产品资料|售后支持'],['工作主线总览','不是完成单点任务，而是把零散信息沉淀为业务资产','产品学习|证据核验|资料建设|客户支持|系统沉淀'],['时间线','2026.05.06 — 2026.07 初主要工作节奏','05.06 产品学习|05下旬 文献核验|06中旬 售后系统|06下旬 产品资料|07初 售前线索'],['产品技术学习','建立“产品结构 → 实验场景 → 客户价值”的理解框架','ULA|Honeycomb|Microwell|Spheroid|Organoid'],['文献证据核验','不能把“方向相关论文”直接写成“使用公司产品”','VIVOID|三体生物|AUT042801|Honeycomb Chips|ULA'],['产品线资料','产品叙事从“成球耗材”升级为“三维细胞模型培养解决方案”','产品结构|说明图|移液枪操作图|康宁对标'],['客户售后支持','典型案例：96 孔蜂巢板细胞球培养 40 h 后不易取出','细胞类型|培养时间|ECM|枪头操作'],['售后系统','从“微信群记录导入”升级为“客户问题知识库”','PostgreSQL|证据篮|conversation window|隐私边界'],['售前高校拓客','以苏州大学基础医学院为起点，建立 raw → memory → R2 → 工作台链路','Raw Crawler|Memory Repo|R2|Overlay|工作台'],['AI 协作贯穿始终','AI 不是单独模块，而是贯穿信息收集、结构化、系统化和复核的底层方法','Codex|GitHub|R2/JSON|人工复核'],['其他协助事项','附带支持与正在接手工作，不作为主线夸大','售后群答疑|交流会议支持|公众号/小红书|候选人材料'],['阶段性成果','两个月形成的主要沉淀','技术框架|证据分级|产品表达|售后知识|售后系统|售前线索|AI协作|内容渠道'],['当前问题与不足','下一阶段需要继续规范化与系统化','证据复核|系统迭代|视觉统一|人工复核|内容渠道'],['下一阶段计划','延续沉淀式推进方式，把资料、问题和线索进一步产品化','产品资料库|文献证据库|售后知识库|售前线索库|内容渠道'],['汇报总结','围绕三维细胞模型产品，将产品知识、文献证据、客户问题和销售线索持续沉淀为公司可复用资产。','产品知识|文献证据|售后知识库|售前线索库']];function H(i){return `<div class="hdr"><div class="mark">入职工作汇报</div><div>NO. ${String(i).padStart(2,'0')} / 15</div></div><div class="progress"><span style="width:${Math.round(i/15*100)}%"></span></div>`}function slide(d,i){let tags=d[2].split('|');let dark=i===15?' dark':'';let body=i===1?`<h1 class="headline big">${d[0]}</h1><p class="lede">${d[1]}</p>`:`<div class="eyebrow"><b>§${String(i-1).padStart(2,'0')}</b></div><h2 class="headline">${d[0]}</h2><p class="lede">${d[1]}</p>`;let flow=`<div class="flow">${tags.slice(0,5).map(x=>`<div class="step"><b>${x}</b><p>持续沉淀与复核</p></div>`).join('')}</div>`;return `<section class="slide${dark}" id="s${i}">${H(i)}<div class="body-area">${body}${flow}<div class="taglist">${tags.map(x=>`<span class="tag amber">${x}</span>`).join('')}</div></div><div class="footer-note"><span>入职两个月阶段工作汇报</span><span>2026.05.06 — 2026.07 初</span></div></section>`}document.getElementById('deck').innerHTML=data.map((d,i)=>slide(d,i+1)).join('');</script></body></html>
