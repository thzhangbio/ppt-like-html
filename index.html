<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ppt-like-html · 模板原位编辑器</title>
  <link rel="stylesheet" href="src/template-editor.css" />
</head>
<body>
  <div id="editorChrome" class="editor-chrome">
    <div class="editor-bar">
      <div class="editor-brand">
        <strong>ppt-like-html</strong>
        <span>基于 VIVOID_同风格正式汇报模板套件.html 的原位编辑</span>
      </div>
      <div class="editor-actions">
        <button id="btnUndo">撤销</button>
        <button id="btnRedo">恢复</button>
        <button id="btnDelete">删除</button>
        <button id="btnBringFront">置顶</button>
        <button id="btnSendBack">置底</button>
        <button id="btnImage">替换/插入图片</button>
        <button id="btnExport" class="primary">导出 HTML</button>
      </div>
    </div>
    <aside id="inspector" class="editor-inspector">
      <h3>属性</h3>
      <p id="selectionInfo">未选中元素</p>
      <div class="field-grid">
        <label>X<input id="propX" type="number"></label>
        <label>Y<input id="propY" type="number"></label>
        <label>宽<input id="propW" type="number"></label>
        <label>高<input id="propH" type="number"></label>
      </div>
      <label>文字角色
        <select id="propRole">
          <option value="keep">保持当前</option>
          <option value="title">标题</option>
          <option value="body">正文</option>
          <option value="caption">图注</option>
          <option value="tag">标签</option>
          <option value="header">页眉</option>
        </select>
      </label>
      <div class="field-grid">
        <label>字号<input id="propFontSize" type="number"></label>
        <label>颜色<input id="propColor" type="color"></label>
      </div>
      <label>文字内容<textarea id="propText" rows="5"></textarea></label>
      <label>图片显示
        <select id="propFit">
          <option value="contain">完整显示 contain</option>
          <option value="cover">裁剪填满 cover</option>
        </select>
      </label>
      <p class="hint">单击选择；双击文字编辑；拖动移动；右下角控制点缩放；Shift/Cmd/Ctrl 多选；Ctrl/Cmd+Z 撤销；Delete 删除。</p>
    </aside>
  </div>

  <div id="templateMount" class="template-mount">
    <div class="loading">正在加载 VIVOID 同风格模板套件...</div>
  </div>

  <input id="imageInput" type="file" accept="image/*" hidden />
  <div id="selectionBox" class="editor-selection hidden"><span class="resize-handle"></span></div>
  <div id="toast" class="editor-toast hidden"></div>

  <script src="src/template-editor.js"></script>
</body>
</html>
